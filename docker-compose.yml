version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: sicisv-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sicisv
      POSTGRES_USER: sicisv
      POSTGRES_PASSWORD: sicisv_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicisv -d sicisv"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
