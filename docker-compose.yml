version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: sicisv-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sicisv
      POSTGRES_USER: sicisv
      POSTGRES_PASSWORD: sicisv_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicisv -d sicisv"]
      interval: 5s
      timeout: 5s
      retries: 5

  facial-service:
    build:
      context: ./backend/facial-service
      dockerfile: Dockerfile
    container_name: sicisv-facial
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql+psycopg2://sicisv:sicisv_dev@host.docker.internal:5433/sicisv
      HOST: "0.0.0.0"
      PORT: "3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
